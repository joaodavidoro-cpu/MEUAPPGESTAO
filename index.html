<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Motoka Gestão" />
  <meta name="description" content="Controle de gastos pessoais e da moto, manutenção e orçamentos. Funciona offline." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Motoka Gestão</title>
</head>
<body>
  <!-- Topo / cabeçalho do app -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-logo">📈</div>
      <div class="brand-text">
        <strong>Motoka Gestão</strong>
        <span>Controle de Entregas</span>
      </div>
    </div>
    <button id="periodoBtn" class="periodo-btn" type="button">
      <span id="periodoLabel">Todos os Períodos</span> ▾
    </button>
  </header>

  <!-- Conteúdo das telas -->
  <main id="view" class="view"></main>

  <!-- Navegação inferior (mobile) -->
  <nav class="tabbar">
    <button class="tab active" data-route="painel">
      <span class="tab-ico">▦</span><span>Painel</span>
    </button>
    <button class="tab" data-route="historico">
      <span class="tab-ico">🗒️</span><span>Histórico</span>
    </button>
    <button class="tab tab-add" data-route="novo">
      <span class="tab-add-circle">＋</span>
    </button>
    <button class="tab" data-route="manutencao">
      <span class="tab-ico">🔧</span><span>Manutenção</span>
    </button>
    <button class="tab" data-route="orcamento">
      <span class="tab-ico">🧾</span><span>Orçamento</span>
    </button>
  </nav>

  <!-- Container de modais / toasts -->
  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
